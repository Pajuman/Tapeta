<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="style.css" type="text/css">
  <script type="module" src="./js/main.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <title>Konfigurátor cedule</title>  
</head>
<body>

  <h2>Napiš text na ceduli</h2>  

  <br />

  <div>
    <canvas id="canvas"></canvas>
    <button id="downloadPdf">Stáhnout PDF</button>
    <button id="addText">+ Přidat text</button>
  </div>

  <div id="textControlsContainer"></div>
  
<!-- only template in HTML -->
<template id="textLayerTemplate">
  <div class="text-layer">
    <input class="textInput" placeholder="Sem piště text" />
    <select class="fontSelect">
      <option value="Arial">Arial</option>
      <option value="Times New Roman">Times New Roman</option>
      <option value="Courier New">Courier New</option>
    </select>

    <button class="increaseFont">A+</button>
    <button class="decreaseFont">A-</button>
  </div>
</template>    
  
</body>
</html>
